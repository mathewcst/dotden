appId: app.dotden.desktop
productName: dotden
electronVersion: 42.4.0
copyright: Copyright © 2026 dotden contributors
icon: resources/packaging/icon.png

# Packaged app metadata. The workspace package remains @dotden/desktop.
extraMetadata:
  name: dotden
  description: Keep your setup in sync — private, portable, yours.
  homepage: https://dotden.app
  repository:
    type: git
    url: git+https://github.com/mathewcst/dotden.git

directories:
  output: release
  buildResources: resources/packaging

files:
  - out/**
  - package.json

# The bundled, pinned chezmoi + git binaries (issue 3-19). `beforePack` (below) fetches
# the build target's binaries into resources/bin/<platform>/<arch>/ first, then this copies
# them to <resources>/bin/, exactly where src/main/foundation/tools.ts resolves them.
# Build-time-only files (the lock + README) are excluded — they are not needed at runtime.
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - '**/*'
      - '!tools.lock.json'
      - '!README.md'

# Populate resources/bin/<platform>/<arch>/ with the pinned chezmoi + git for the target
# being packaged, before electron-builder copies extraResources. A clean checkout ships
# only the lock, so without this the installer would carry no tools (ADR 0010).
beforePack: scripts/before-pack.mjs

asar: true
compression: maximum
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

publish:
  provider: github
  owner: mathewcst
  repo: dotden
  releaseType: release

mac:
  target:
    - dmg
  category: public.app-category.productivity
  # v1 ships unsigned per docs/scope-v1.md (Distribution) / ADR 0010; remove once signing is enabled.
  identity: null
  hardenedRuntime: true

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - nsis

nsis:
  artifactName: ${productName}-setup-${version}-${arch}.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: dotden

linux:
  target:
    - AppImage
  category: Utility
  syncDesktopName: true
  maintainer: dotden contributors
  executableName: dotden
  synopsis: dotden
  description: Keep your setup in sync — private, portable, yours.
