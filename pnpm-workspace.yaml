packages:
  - 'apps/*'
  - 'packages/*'

catalog:
  # ESLint 10 (coupled bump: @eslint/js + eslint + globals must move together).
  # All plugins below already declare `^10.0.0` peer support, and typescript-eslint
  # gained ESLint-10 support at 8.61.0 (keep it at/above that floor). ESLint 10 has
  # behavioral shifts (per-file config lookup, JSX identifiers count as references)
  # but no install-time blockers. See ADR 0028.
  '@eslint/js': ^10.0.1
  eslint: ^10.5.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-astro: ^1.7.0
  # Renderer layer-boundary gate (ADR 0035): the three-layer graph (ADR 0033) +
  # ui/den surface split (ADR 0036) as a lint rule. Flat-config, peer `eslint >=6`.
  eslint-plugin-boundaries: ^6.0.2
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-turbo: ^2.9.18
  globals: ^17.6.0
  prettier: ^3.8.4
  turbo: ^2.9.18
  typescript: ^6.0.3
  typescript-eslint: ^8.61.1

catalogs:
  react19:
    react: ^19.2.7
    react-dom: ^19.2.7
    '@types/react': ^19.2.17
    '@types/react-dom': ^19.2.3
  desktop:
    # HELD on Babel 7 — babel-plugin-react-compiler@1.0.0 pins `@babel/types ^7.26.0`
    # internally and ships no Babel 8 support. Babel exists here ONLY to run the React
    # Compiler pass (ADR 0011); `@rolldown/plugin-babel` already accepts Babel 8, so the
    # compiler plugin is the sole blocker. Revisit when React Compiler ships Babel 8
    # support. See ADR 0028.
    '@babel/core': ^7.29.0
    '@babel/plugin-transform-runtime': ^7.29.0
    '@babel/runtime': ^7.29.0
    '@base-ui/react': ^1.5.0
    '@fontsource-variable/geist': ^5.2.9
    '@fontsource-variable/geist-mono': ^5.2.8
    # Pinned/reviewed for ADR 0032. Headless Tree is the shadcn ecosystem's tree base and
    # replaces @pierre/trees for both Workspace and incoming File trees.
    '@headless-tree/core': 1.7.0
    '@headless-tree/react': 1.7.0
    '@rolldown/plugin-babel': ^0.2.3
    '@tailwindcss/vite': ^4.3.1
    '@testing-library/react': ^16.3.2
    '@testing-library/user-event': ^14.6.1
    # HELD on v24 to track the Node 24 runtime (engines.node >=24). Don't float the
    # ambient node types ahead of the runtime major. See ADR 0028.
    '@types/node': ^24.10.1
    '@vitejs/plugin-react': ^6.0.2
    babel-plugin-react-compiler: 1.0.0
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    electron: ^42.4.1
    electron-builder: ^26.15.3
    # Catalogued for a single source of truth (ADR 0028). electron-builder can't read the
    # `catalog:` protocol — it validates electron-updater's version straight from
    # apps/desktop/package.json and aborts `package` on the unresolved string — so the
    # desktop electron-builder.yml mirrors this version via `extraMetadata`. Keep in sync.
    electron-updater: ^6.8.9
    electron-vite: 6.0.0-beta.1
    happy-dom: ^20.10.6
    lucide-react: ^1.20.0
    # Pinned to the latest v3 because shadcn's generated Resizable component still targets the
    # PanelGroup/PanelResizeHandle API; v4 renamed those exports to Group/Separator.
    react-resizable-panels: 3.0.6
    tailwind-merge: ^3.6.0
    tailwindcss: ^4.3.1
    vite: ^8.0.16
    vitest: ^4.1.9
    zustand: ^5.0.14
  astro:
    # Marketing site (apps/web). Toolchain intentionally diverges from desktop and is
    # kept deliberately frozen: Astro 6.4 depends on `vite ^7` directly and warns/breaks
    # under Vite 8, so vite + the matching @tailwindcss/vite/tailwindcss stay pinned here
    # while desktop runs Vite 8. Bump vite only when a future Astro major adds Vite 8
    # support. See ADR 0028.
    '@astrojs/check': ^0.9.9
    '@tailwindcss/vite': 4.1.18
    astro: ^6.4.8
    tailwindcss: 4.1.18
    vite: ^7.3.5
  prettier-plugins:
    prettier-plugin-astro: ^0.14.1
    # Pre-1.0, so a minor *can* change Tailwind class-sort output; verified this 0.6→0.8
    # bump produced no class reordering in our sources (no churn). See ADR 0028.
    prettier-plugin-tailwindcss: ^0.8.0

nodeLinker: hoisted

minimumReleaseAge: 4320
minimumReleaseAgeStrict: true
minimumReleaseAgeExclude:
  - '@dotden/*'
  - babel-plugin-react-compiler
  - electron-vite
  - electron
  - electron-builder
  - electron-updater

allowBuilds:
  esbuild: true
  '@tailwindcss/oxide': true
  electron: true
  '@swc/core': true
  electron-winstaller: true
  sharp: true
