name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Publish installers + electron-updater feed files to the GitHub Release.
permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: --linux AppImage
          - os: macos-latest
            target: --mac dmg
          - os: windows-latest
            target: --win nsis

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build renderer and main
        run: pnpm --filter @dotden/desktop exec electron-vite build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @dotden/desktop exec electron-builder ${{ matrix.target }} --publish always
