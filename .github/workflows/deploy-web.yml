# Builds the marketing site (apps/web) and deploys it to GitHub Pages.
# Pages serves it at the custom domain dotden.app (see apps/web/public/CNAME).
name: Deploy web

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes.
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

# Least-privilege token plus what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup reads the version from root package.json "packageManager".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # astro:assets optimises images with Sharp at build; the OG image is
      # pre-generated and committed, so no fonts are needed here.
      - name: Build site
        run: pnpm --filter @dotden/web build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
